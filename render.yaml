databases:
  - name: demarq-db
    plan: free

services:
  - type: web
    name: demarq
    env: node
    buildCommand: NODE_ENV=development npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.15.0
      - key: DATABASE_URL
        fromDatabase:
          name: demarq-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: demarq
      - key: ADMIN_PASS
        value: "2026"
